<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Page</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <nav id="navbar">
      <a href="" class="nav-brand">App</a>
      <ul>
        <li class="nav-item"><a href="about.html">About us</a></li>
        <li><a href="" class="nav-item btn btn-default">Register</a></li>
      </ul>
    </nav>

    <div class="container" id="main">
        <h1>Welcome to our app</h1>
        <p>
            Lorem ipsum dolor sit amet consectetur, adipisicing elit. Natus,
            voluptatem.
        </p>

        <form id="todo-form">
            <label for="todo-title">Todo</label>
            <input id="todo-title" type="text" placeholder="Enter your todo">
            <select id="todo-category">
                <option value="work">Work</option>
                <option value="personal">Personal</option>
            </select>
            <input type="submit" class="btn btn-outline" value="Add" />
        </form>
        <hr class="separator" />
        <div>
            <label>
                Filter:
                <select id="todo-filter">
                    <option value="">Show all</option>
                    <option value="work">Work only</option>
                    <option value="personal">Personal only</option>
                </select>
            </label>
            <h3>Todos <span id="todo-count"></span></h3>
            <ul id="todo-list"></ul>
        </div>
    </div>

    <footer id="footer-wrapper">
        <a href="about.html" target="_blank">About us</a>
        <a href="contact.html" target="_blank">Contact us</a>
    </footer>
        <!-- Your HTML content -->
        <script type="module">
            import Todos from './todos.js';
            
            // Initialize the todos instance
            const todos = new Todos();
            
            // Add event listener to the form
            document.getElementById('todo-form').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const title = document.getElementById('todo-title').value;
                const category = document.getElementById('todo-category').value;
                
                todos.add(title, category);
                
                // Clear the input
                document.getElementById('todo-title').value = '';
                
                // Update the display
                displayTodos();
            });
            
            // Function to display todos
            function displayTodos() {
                const todoList = document.getElementById('todo-list');
                todoList.innerHTML = '';
                
                todos.getAll().forEach(todo => {
                    const li = document.createElement('li');
                    li.textContent = `${todo.title} (${todo.category})`;
                    todoList.appendChild(li);
                });
            }
            
            // Initial display
            displayTodos();
        </script>
    
</body>
</html>
